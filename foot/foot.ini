
# include=/usr/share/sway/templates/foot.ini


[key-bindings]
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste

[scrollback]
lines=100

[main]
pad=5x5
shell=/usr/bin/zsh
#font=monospace:size=12
# font=ZedMono NFM:style=Regular:size=14
# font-bold=ZedMono NFM:style=Bold:size=14
font=Monaspace Neon NF:style=Medium:size=14
font-bold=Monaspace Neon NF:style=SemiBold:size=14
# font=IosevkaTerm NF:size=14
# font-bold=IosevkaTerm NF:style=Bold:size=14
# font=CaskaydiaMono NFM:size=14
# font-bold=IosevkaTerm NF:style=Bold:size=14
#font=JetBrainsMono NFM:size=14
#font-bold=JetBrainsMono NFM:style=Bold:size=14
bold-text-in-bright=no

[bell]
urgent=no

[colors-dark]
